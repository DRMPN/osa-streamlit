name: OSA Add Docstrings

on:
  workflow_dispatch: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    
jobs:
  check-docstrings:
    name: Check Docstrings with OSA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        
      - name: Run OSA
        uses: aimclub/OSA@feature/ci_cd_mode
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          api: 'openai'
          base_url: 'https://openrouter.ai/api/v1'
          model: 'openai/gpt-4o'
